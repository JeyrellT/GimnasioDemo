<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-label="Forja logo monocromatico blanco">
  <title>Forja</title>
  <!-- Version monocromatica blanca: toda una tinta #FFFFFF -->
  <!-- Isotipo: yunque, todo en blanco -->
  <rect x="7" y="46" width="50" height="14" rx="4" fill="#FFFFFF"/>
  <polygon points="14,46 50,46 47,32 17,32" fill="#FFFFFF"/>
  <polygon points="4,20 50,20 60,32 4,32" fill="#FFFFFF"/>
  <!-- Chispa: misma tinta, sin accent color -->
  <polygon points="52,20 60,20 60,28" fill="#FFFFFF" opacity="0.6"/>
  <!-- Wordmark en blanco -->
  <text
    x="80"
    y="44"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="48"
    letter-spacing="-0.02em"
    fill="#FFFFFF"
  >forja</text>
</svg>

name: Deploy Forja Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Swap NextAuth route for static export
        run: |
          cat > 'src/app/api/auth/[...nextauth]/route.ts' << 'STUB'
          import { NextResponse } from "next/server";
          export const dynamic = "force-static";
          export function generateStaticParams() {
            return [{ nextauth: ["session"] }, { nextauth: ["signin"] }, { nextauth: ["signout"] }];
          }
          export function GET() {
            return NextResponse.json({ error: "not available in demo" }, { status: 404 });
          }
          export function POST() {
            return NextResponse.json({ error: "not available in demo" }, { status: 404 });
          }
          STUB

      - name: Build static export
        run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          GITHUB_PAGES: "true"

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

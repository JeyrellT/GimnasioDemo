name: Deploy Blackline Fitness to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Swap NextAuth route for static export
        run: |
          cat > 'src/app/api/auth/[...nextauth]/route.ts' << 'STUB'
          import { NextResponse } from "next/server";
          export const dynamic = "force-static";
          export function generateStaticParams() {
            return [{ nextauth: ["session"] }, { nextauth: ["signin"] }, { nextauth: ["signout"] }];
          }
          export function GET() {
            return NextResponse.json({ error: "not available in demo" }, { status: 404 });
          }
          export function POST() {
            return NextResponse.json({ error: "not available in demo" }, { status: 404 });
          }
          STUB

      - name: Build static export
        run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          GITHUB_PAGES: "true"
          # Static-export build runs entirely in CI and never reaches a real DB
          # or auth provider. These values are dummies that only satisfy the
          # Zod validation in src/server/env.ts at build time. They are never
          # used at runtime in the demo because /api/auth is stubbed above and
          # all server actions are pre-rendered. Do NOT reuse these in any
          # production environment — Railway's env vars are the source of truth.
          APP_URL: "https://example.com"
          NEXTAUTH_URL: "https://example.com"
          NEXTAUTH_SECRET: "github-pages-static-export-dummy-secret-32chars-min"
          DATABASE_URL: "postgresql://user:pass@localhost:5432/build?pgbouncer=true&connection_limit=10"
          DIRECT_URL: "postgresql://user:pass@localhost:5432/build"
          ENCRYPTION_KEY_PRIMARY: "github-pages-static-export-dummy-key-32chars-min-aaa"
          IMPERSONATION_SECRET: "github-pages-static-export-dummy-impersonation-secret-32chars"

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

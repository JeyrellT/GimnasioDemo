name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Vercel Preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel (preview)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # No --prod — genera un preview URL unico por PR
          github-comment: false

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview-url }}';
            const sha = context.sha.substring(0, 7);
            const body = [
              '### Preview Forja desplegado',
              '',
              `**URL:** ${previewUrl}`,
              `**Commit:** \`${sha}\``,
              '',
              'Las variables de entorno del ambiente preview estan configuradas en el dashboard de Vercel.',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

# ── Secrets requeridos — configurar manualmente en GitHub repo settings ───────
#
#   VERCEL_TOKEN       Token de cuenta Vercel.
#                      Obtener en: https://vercel.com/account/tokens
#
#   VERCEL_ORG_ID      Org ID del proyecto en Vercel.
#                      Obtener con: vercel link (muestra .vercel/project.json)
#
#   VERCEL_PROJECT_ID  Project ID del proyecto en Vercel.
#                      Obtener con: vercel link (muestra .vercel/project.json)
#
# ── Variables de entorno de la app ────────────────────────────────────────────
# Las variables de entorno de Forja (DATABASE_URL, NEXTAUTH_SECRET, etc.)
# se configuran DIRECTAMENTE en el dashboard de Vercel bajo
# Settings > Environment Variables > Preview.
# No se pasan como secrets de GitHub Actions.

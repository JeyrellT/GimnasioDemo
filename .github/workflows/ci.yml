name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Placeholder env vars needed for Next.js build validation (Zod env.ts).
  # Real secrets are never stored here — configure them in GitHub Secrets
  # for jobs that actually need them.
  NEXTAUTH_URL: "http://localhost:3000"
  NEXTAUTH_SECRET: "ci-placeholder-not-a-real-secret"
  RESEND_API_KEY: "re_ci_placeholder"
  RESEND_FROM_EMAIL: "hola@forja.app"
  GEMINI_API_KEY: "AIza_ci_placeholder"
  GEMINI_MODEL_OCR: "gemini-2.0-flash-lite"
  GEMINI_MODEL_REASONING: "gemini-2.0-flash"
  R2_ACCOUNT_ID: "ci_placeholder"
  R2_ACCESS_KEY_ID: "ci_placeholder"
  R2_SECRET_ACCESS_KEY: "ci_placeholder"
  R2_BUCKET_PHOTOS: "forja-photos"
  R2_BUCKET_DOCUMENTS: "forja-documents"
  R2_PUBLIC_URL: "https://pub-ci.r2.dev"
  R2_ENDPOINT: "http://localhost:9000"
  TILOPAY_API_KEY: "ci_placeholder"
  TILOPAY_WEBHOOK_SECRET: "ci_placeholder"
  HACIENDA_USERNAME: "cpf-00-0000-0000"
  HACIENDA_PASSWORD: "ci_placeholder"
  HACIENDA_CERT_PATH: "./certs/hacienda.p12"
  HACIENDA_CERT_PIN: "0000"
  SENTRY_DSN: "https://ci@o0.ingest.sentry.io/0"
  POSTHOG_KEY: "phc_ci_placeholder"
  POSTHOG_HOST: "https://analytics.forja.app"
  ENCRYPTION_KEY_PRIMARY: "Y2lfcGxhY2Vob2xkZXJfa2V5XzMyX2J5dGVzX2xvbmc="
  ENCRYPTION_KEY_SECONDARY: "Y2lfcGxhY2Vob2xkZXJfa2V5XzMyX2J5dGVzX2xvbmc="
  PAYMENT_PROVIDER_LIVE: "false"
  BILLING_LIVE: "false"
  AI_ASSIST_LIVE: "false"
  MEDIAPIPE_POSTURE_BETA: "false"
  NODE_ENV: "production"
  APP_URL: "http://localhost:3000"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: "postgresql://forja:forja_dev@localhost:5432/forja?schema=public"
          DIRECT_URL: "postgresql://forja:forja_dev@localhost:5432/forja?schema=public"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: forja
          POSTGRES_PASSWORD: forja_dev
          POSTGRES_DB: forja
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forja -d forja"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://forja:forja_dev@localhost:5432/forja?schema=public"
      DIRECT_URL: "postgresql://forja:forja_dev@localhost:5432/forja?schema=public"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run unit tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-typecheck

    env:
      DATABASE_URL: "postgresql://forja:forja_dev@localhost:5432/forja?schema=public"
      DIRECT_URL: "postgresql://forja:forja_dev@localhost:5432/forja?schema=public"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build
        run: pnpm build

  e2e:
    name: E2E Tests (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    # Tests e2e aun no existen en MVP — se agregan progresivamente.
    # continue-on-error permite que el CI pase mientras se construyen los tests.
    continue-on-error: true

    env:
      DATABASE_URL: "postgresql://forja:forja_dev@localhost:5432/forja?schema=public"
      DIRECT_URL: "postgresql://forja:forja_dev@localhost:5432/forja?schema=public"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpx playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

# ── Secrets que hay que configurar manualmente en GitHub ─────────────────────
# No se requieren secrets de Forja para CI — los env vars usan placeholders.
# Para el job de e2e contra un ambiente real (futuro), configurar:
#   DATABASE_URL_TEST  — base de datos de testing aislada

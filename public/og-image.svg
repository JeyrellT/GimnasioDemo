<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Blackline Fitness — Tu linea, tu fuerza">
  <title>Blackline Fitness — Plataforma de entrenamiento personal hecha en Costa Rica</title>
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#1E2A38"/>
    </linearGradient>
    <linearGradient id="og-brand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="og-silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="50%" stop-color="#C7D2FE"/>
      <stop offset="100%" stop-color="#A5B4FC"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#og-bg)"/>

  <!-- BL Monogram: B in silver, L in blue -->
  <g transform="translate(440, 100) scale(2.2)">
    <!-- B -->
    <path d="M 4 6 h10 c3.5 0 6 2 6 5 c0 2.2-1.2 3.8-3.2 4.4 c2.5 0.7 4.2 2.8 4.2 5.6 c0 3.5-2.8 6-6.5 6 H4 Z M 9 13.5 h4.5 c1.8 0 2.8-1 2.8-2.3 c0-1.3-1-2.2-2.8-2.2 H9 Z M 9 24 h5.5 c2 0 3.2-1.2 3.2-2.7 c0-1.5-1.2-2.7-3.2-2.7 H9 Z" fill="url(#og-silver)"/>
    <!-- L -->
    <path d="M 23 6 h5 v21 h8.5 v5 H23 Z" fill="url(#og-brand)"/>
    <!-- Lightning -->
    <path d="M 22 8 L 20 20 L 23 18 L 21 32" stroke="#60A5FA" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  </g>

  <!-- Brand text: BLACKLINE -->
  <text x="600" y="230" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="72" letter-spacing="0.08em" fill="#C7D2FE">BLACKLINE</text>

  <!-- FITNESS with blue line -->
  <rect x="460" y="245" width="280" height="2" rx="1" fill="#3B82F6"/>
  <text x="600" y="278" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="32" letter-spacing="0.35em" fill="#3B82F6">FITNESS</text>

  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="48" fill="#FAFAFA">Tu l&#xED;nea, tu fuerza.</text>

  <text x="600" y="440" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="24" fill="#A1A1AA">Entrenamiento personal hecho en Costa Rica</text>

  <!-- Blue accent line -->
  <rect x="560" y="510" width="80" height="4" rx="2" fill="#3B82F6"/>

  <!-- Domain -->
  <text x="1172" y="614" text-anchor="end" font-family="ui-monospace, monospace" font-weight="400" font-size="16" fill="#71717A">blacklinefitness.app</text>
</svg>

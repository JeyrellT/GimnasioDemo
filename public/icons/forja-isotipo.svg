<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Forja isotipo">
  <title>Forja</title>
  <defs>
    <!-- Chispa highlight en brasa -->
  </defs>
  <!-- Base trapezoidal inferior: la base solida del yunque -->
  <rect x="7" y="46" width="50" height="14" rx="4" fill="#1E2A38"/>
  <!-- Cuerpo central trapezoidal invertido: une la base con la cara superior -->
  <polygon points="14,46 50,46 47,32 17,32" fill="#1E2A38"/>
  <!-- Cara superior de forja: rectangulo con chaflan en esquina superior derecha -->
  <!-- El chaflan diagonal sugiere el filo / impacto: top-left normal, top-right chaflado -->
  <polygon points="4,20 50,20 60,32 4,32" fill="#FF6A1A"/>
  <!-- Chispa accent en brasa: triangulo pequeno en el chaflan, highlight sutil -->
  <polygon points="52,20 60,20 60,28" fill="#F5C542" opacity="0.92"/>
</svg>

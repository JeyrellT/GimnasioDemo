<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" role="img" aria-label="Blackline Fitness app icon">
  <title>Blackline Fitness</title>
  <defs>
    <linearGradient id="i192-silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="35%" stop-color="#FFFFFF"/>
      <stop offset="65%" stop-color="#B0BEC5"/>
      <stop offset="100%" stop-color="#78909C"/>
    </linearGradient>
    <linearGradient id="i192-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="i192-bolt" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="i192-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#3B82F6" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="i192-bolt-glow" x="-60%" y="-20%" width="220%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#60A5FA" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="192" height="192" rx="42" fill="#09090B"/>
  <g transform="translate(32,28) scale(2)">
    <!-- B letter -->
    <path d="M 6 6 L 24 6 L 29 10 L 29 19 L 25 23 L 30 27 L 30 40 L 25 45 L 6 45 Z" fill="url(#i192-silver)"/>
    <path d="M 14 13 L 22 13 L 24 15 L 24 19 L 22 21 L 14 21 Z" fill="#09090B"/>
    <path d="M 14 28 L 23 28 L 25 30 L 25 37 L 23 39 L 14 39 Z" fill="#09090B"/>
    <!-- L letter -->
    <path d="M 33 6 L 40 6 L 40 39 L 56 39 L 56 45 L 33 45 Z" fill="url(#i192-blue)" filter="url(#i192-glow)"/>
    <!-- Lightning bolt -->
    <path d="M 37 2 L 31 24 L 36 21 L 29 50" stroke="url(#i192-bolt)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#i192-bolt-glow)"/>
    <path d="M 37 2 L 31 24 L 36 21 L 29 50" stroke="white" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  </g>
</svg>

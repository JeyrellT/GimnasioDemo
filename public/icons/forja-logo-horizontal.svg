<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-label="Forja logo horizontal">
  <title>Forja</title>
  <!-- Isotipo: yunque estilizado, offset x=0, encuadrado en 64x64 -->
  <!-- Base trapezoidal inferior -->
  <rect x="7" y="46" width="50" height="14" rx="4" fill="#1E2A38"/>
  <!-- Cuerpo central -->
  <polygon points="14,46 50,46 47,32 17,32" fill="#1E2A38"/>
  <!-- Cara superior con chaflan diagonal -->
  <polygon points="4,20 50,20 60,32 4,32" fill="#FF6A1A"/>
  <!-- Chispa brasa -->
  <polygon points="52,20 60,20 60,28" fill="#F5C542" opacity="0.92"/>
  <!-- Wordmark a la derecha: x=80 (64 isotipo + 16 espacio), centrado verticalmente en y=64 -->
  <text
    x="80"
    y="44"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="48"
    letter-spacing="-0.02em"
    fill="#FAFAFA"
  >forja</text>
</svg>

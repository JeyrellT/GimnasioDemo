<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Blackline Fitness favicon">
  <title>Blackline Fitness</title>
  <!-- Dumbbell icon 32x32 — brand orange -->
  <!-- Left outer plate -->
  <rect x="3" y="10" width="4" height="12" rx="1.5" fill="#FF6A1A"/>
  <!-- Left inner plate -->
  <rect x="8" y="12" width="3" height="8" rx="1" fill="#FF6A1A"/>
  <!-- Bar -->
  <rect x="11" y="14.5" width="10" height="3" rx="1" fill="#FF6A1A"/>
  <!-- Right inner plate -->
  <rect x="21" y="12" width="3" height="8" rx="1" fill="#FF6A1A"/>
  <!-- Right outer plate -->
  <rect x="25" y="10" width="4" height="12" rx="1.5" fill="#FF6A1A"/>
</svg>
